name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build ARM64, Scan, Push to GHCR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbd0dd6f4ea465dd01ad9f2909fce63 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6eac9facb9e2f667d0d8eb3f0ecf # v3.8.0

      - name: Log in to GHCR
        uses: docker/login-action@9780b227c21fd5a065206bdbddd65c07458ee753 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@8e5442c4bef9f05edf82659e27d37f89fcb44b8c # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image archive
        uses: docker/build-push-action@4f5ea752ba115bc23ebd6efaea2f18724136f736 # v6.9.0
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=oci,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@6a801d8a33e879a682d20e05ace8edf0005630b8 # 0.28.0
        with:
          input: /tmp/image.tar
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image to GHCR
        uses: docker/build-push-action@4f5ea752ba115bc23ebd6efaea2f18724136f736 # v6.9.0
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Verify image contains no env secrets
        run: |
          if tar -xOf /tmp/image.tar index.json 2>/dev/null | grep -qiE 'JWT_SECRET|api_token=|password_hash'; then
            echo "Potential secret found in image metadata"
            exit 1
          fi
          echo "Image secret check passed"

  trigger-deploy:
    name: Trigger Deploy Webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions: {}
    steps:
      - name: POST deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          SIG=$(printf '' | openssl dgst -sha256 -hmac "${DEPLOY_WEBHOOK_SECRET}" | awk '{print $2}')
          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}"
