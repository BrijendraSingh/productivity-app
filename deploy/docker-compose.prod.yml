services:
  app:
    image: ghcr.io/brijendrasingh/productivity-app:latest
    container_name: productivity-app
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3001'
    env_file: .env
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
